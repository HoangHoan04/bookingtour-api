# Render.com deployment configuration
# Alternative free option to Railway

services:
  # API Service
  - type: web
    name: bookingtour-api
    env: node
    region: singapore
    plan: free
    buildCommand: yarn install && yarn build
    startCommand: node dist/main
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4300
      # Add other environment variables in Render Dashboard
      # Database, JWT, Cloudinary, etc.
    autoDeploy: true
