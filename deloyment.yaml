---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-tour-api
  labels:
    app: booking-tour-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: booking-tour-api
  template:
    metadata:
      labels:
        app: booking-tour-api
    spec:
      containers:
        - name: booking-tour-api
          image: your-docker-registry/booking-tour-api:latest
          ports:
            - containerPort: 4300
          envFrom:
            - configMapRef:
                name: booking-tour-api-config
            - secretRef:
                name: booking-tour-api-secrets
          resources:
            requests:
              memory: '256Mi'
              cpu: '250m'
            limits:
              memory: '512Mi'
              cpu: '500m'
          livenessProbe:
            httpGet:
              path: /health
              port: 4300
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4300
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: booking-tour-api-service
spec:
  selector:
    app: booking-tour-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4300
  type: LoadBalancer
